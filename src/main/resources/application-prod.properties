# ============================================================
# PRODUCTION PROFILE — used on Render via SPRING_PROFILES_ACTIVE=prod
# All values come from environment variables set in the Render dashboard.
# Never commit real secrets — these are placeholders read at runtime.
# ============================================================

spring.application.name=job-portal

# Render injects PORT automatically; Spring Boot listens on it
server.port=${PORT:8080}

# ============================================================
# Database (PostgreSQL on Render)
# DATABASE_URL is provided by Render in the form:
# postgres://user:pass@host:port/dbname
# We convert it to JDBC format using the 3 separate env vars Render also provides.
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# JWT — override the secret via environment variable in production
# ============================================================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# ============================================================
# File Upload
# NOTE: Render's free tier has an EPHEMERAL filesystem — uploaded files
# (resumes) are wiped on every redeploy/restart. Fine for a portfolio demo.
# For persistence, see the note in the deployment guide about Cloudinary.
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=/tmp/uploads/resumes

# ============================================================
# Email (optional — disabled by default, enable by setting real SMTP env vars)
# Mail auto-config is excluded to prevent startup crash when no SMTP is configured.
# To enable email: remove the exclude line and set MAIL_USERNAME + MAIL_PASSWORD.
# ============================================================
#spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

# ============================================================
# Swagger
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ============================================================
# Logging — quieter in production
# ============================================================
logging.level.com.jobportal=INFO
logging.level.org.springframework.security=WARN
