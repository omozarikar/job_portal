# ============================================================
# Application
# ============================================================
spring.application.name=job-portal
server.port=8080

# ============================================================
# Database (MySQL)
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/jobportal?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
# JWT
# ============================================================
app.jwt.secret=c2VjcmV0S2V5Rm9ySm9iUG9ydGFsQXBwbGljYXRpb25Qb3J0Zm9saW9Qcm9qZWN0MjAyNA==
app.jwt.expiration=86400000

# ============================================================
# File Upload
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/resumes

# ============================================================
# Email (configure with real SMTP for production)
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ============================================================
# Swagger / OpenAPI
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ============================================================
# Logging
# ============================================================
logging.level.com.jobportal=DEBUG
logging.level.org.springframework.security=DEBUG
